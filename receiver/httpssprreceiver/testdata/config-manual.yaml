---
exporters:
    logging:

receivers:
    httpjson:
        collection_interval: 10s
        initial_delay: 1s
        endpoint: http://localhost/statistics
        fields:
            status_code: $.status_code
            version: $.version
service:
    pipelines:
        metrics:
            receivers: [httpjson]
            processors: []
            exporters: [logging]
