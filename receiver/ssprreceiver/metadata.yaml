---
type: ssprreceiver

sem_conv_version: 1.18.0

status:
  class: receiver
  stability:
    development: [metrics]
  distributions: [liatrio]

attributes:
  http.url:
    description: Full HTTP request URL.
    type: string
  http.status_code:
    description: HTTP response status code
    type: int
  http.method:
    description: HTTP request method
    type: string
  http.response.json:
    description: HTTP response JSON data array
    type: map


# See the [mdatagen documentation](https://github.com/open-telemetry/opentelemetry-collector-contrib/tree/main/cmd/mdatagen) for building this file
# Also see [metadata-sample.yaml](https://github.com/open-telemetry/opentelemetry-collector-contrib/blob/main/cmd/mdatagen/metadata-sample.yaml)
metrics:
  sspr.duration:
    description: Measures the duration of the HTTP request
    enabled: true
    gauge:
      value_type: int
    unit: ms
    attributes: [http.url, http.status_code, http.method, http.response.json]
  sspr.db.unavailable_count:
    description: Measures the number of times the database was unavailable.
    enabled: true
    gauge:
      value_type: int
    unit: count
  sspr.configuration.unlocked:
    description: Indicates that the application is currently in configuration mode; it has been unlocked and cannot be logged into by users until locked.
    enabled: true
    gauge:
      value_type: int
    unit: bool


