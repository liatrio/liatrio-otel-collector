---
receivers:
  gitlab:
    initial_delay: 1s
    collection_interval: 60s
    scrapers:
      gitlab:

  gitlab/customname:
    initial_delay: 1s
    collection_interval: 30s
    scrapers:
      gitlab:

  gitlab/terraform:
    initial_delay: 1s
    collection_interval: 60s
    scrapers:
      gitlab_terraform:

processors:
  nop:

exporters:
  nop:

service:
  pipelines:
    metrics:
      receivers: [gitlab, gitlab/customname, gitlab/terraform]
      processors: [nop]
      exporters: [nop]
