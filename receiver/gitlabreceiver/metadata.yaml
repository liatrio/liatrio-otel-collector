---
type: gitlab

sem_conv_version: 1.27.0

status:
  class: receiver
  stability:
    development: [metrics]
  distributions: [liatrio]

resource_attributes:
  organization.name:
    enabled: true
    description: VCS Organization
    type: string
  vcs.vendor.name:
    enabled: true
    description: The name of the VCS vendor/provider (ie. gitlab)
    type: string

attributes:
  gitlab.catalog.component.name:
    description: The name of a component within a CI/CD Catalog resource.
    type: string
  gitlab.catalog.resource.full_path:
    description: The full path of the CI/CD Catalog resource project.
    type: string
  gitlab.catalog.resource.name:
    description: The name of the CI/CD Catalog resource.
    type: string
  vcs.change.id:
    description: The unique identifier of the VCS change (pull request).
    type: string
  vcs.change.state:
    description: The state of a change (pull request)
    type: string
    enum:
      - open
      - merged
  vcs.line_change.type:
    description: The type of line change being measured on a ref (branch).
    type: string
    enum:
      - added
      - removed
  vcs.ref.base.name:
    description: The name of the VCS base reference (branch) the delta is measured against.
    type: string
  vcs.ref.base.type:
    description: The type of the base reference (branch, tag).
    type: string
    enum:
      - branch
      - tag
  vcs.ref.head.name:
    description: The name of the VCS head reference (branch).
    type: string
  vcs.ref.head.type:
    description: The type of the head reference (branch, tag).
    type: string
    enum:
      - branch
      - tag
  vcs.repository.id:
    description: The unique identifier of the VCS repository.
    type: string
  vcs.repository.name:
    description: The name of the VCS repository.
    type: string
  vcs.repository.url.full:
    description: The canonical URL of the repository providing the complete HTTPS address.
    type: string
  vcs.revision_delta.direction:
    description: The type of revision comparison.
    type: string
    enum:
      - ahead
      - behind
  vcs.terraform.module.name:
    description: The name of the Terraform module in the registry.
    type: string
  vcs.terraform.module.system:
    description: The system (provider) of the Terraform module in the registry.
    type: string

metrics:
  gitlab.catalog.component.project_count:
    enabled: true
    description: The number of projects in the organization using a specific CI/CD Catalog component.
    stability: development
    unit: '{project}'
    gauge:
      value_type: int
    attributes: [gitlab.catalog.component.name]
  gitlab.catalog.project.component_count:
    enabled: true
    description: The number of CI/CD Catalog components used by a project.
    stability: development
    unit: '{component}'
    gauge:
      value_type: int
    attributes: [vcs.repository.url.full]
  gitlab.catalog.resource.star_count:
    enabled: true
    description: The number of stars on a CI/CD Catalog resource.
    stability: development
    unit: '{star}'
    gauge:
      value_type: int
    attributes: [gitlab.catalog.resource.name, gitlab.catalog.resource.full_path]
  gitlab.catalog.resource.usage_count:
    enabled: true
    description: The number of projects using a CI/CD Catalog resource in the last 30 days.
    stability: development
    unit: '{usage}'
    gauge:
      value_type: int
    attributes: [gitlab.catalog.resource.name, gitlab.catalog.resource.full_path]
  vcs.change.count:
    description: The number of changes (pull requests) in a repository, categorized by their state (either open or merged).
    stability: development
    enabled: true
    gauge:
      value_type: int
    unit: '{change}'
    attributes: [vcs.repository.url.full, vcs.change.state, vcs.repository.name, vcs.repository.id]
  vcs.change.duration:
    enabled: true
    description: The time duration a change (pull request/merge request/changelist) has been in an open state.
    stability: development
    unit: s
    gauge:
      value_type: int
    attributes: [vcs.repository.url.full, vcs.repository.name, vcs.repository.id, vcs.ref.head.name, vcs.change.state]
  vcs.change.time_to_approval:
    enabled: true
    description: The amount of time it took a change (pull request) to go from open to approved.
    stability: development
    unit: s
    gauge:
      value_type: int
    attributes: [vcs.repository.url.full, vcs.repository.name, vcs.repository.id, vcs.ref.head.name]
  vcs.change.time_to_merge:
    enabled: true
    description: The amount of time it took a change (pull request) to go from open to merged.
    stability: development
    unit: s
    gauge:
      value_type: int
    attributes: [vcs.repository.url.full, vcs.repository.name, vcs.repository.id, vcs.ref.head.name]
  vcs.contributor.count:
    enabled: false
    description: The number of unique contributors to a repository.
    stability: development
    unit: '{contributor}'
    gauge:
      value_type: int
    attributes: [vcs.repository.url.full, vcs.repository.name, vcs.repository.id]
  vcs.ref.count:
    enabled: true
    description: The number of refs of type branch in a repository.
    stability: development
    unit: '{ref}'
    gauge:
      value_type: int
    attributes: [vcs.repository.url.full, vcs.repository.name, vcs.repository.id, vcs.ref.head.type]
  vcs.ref.lines_delta:
    enabled: true
    description: The number of lines added/removed in a ref (branch) relative to the base ref (the change's target branch).
    stability: development
    unit: '{line}'
    gauge:
      value_type: int
    attributes: [vcs.change.id, vcs.repository.url.full, vcs.repository.name, vcs.repository.id, vcs.ref.head.name, vcs.ref.head.type, vcs.ref.base.name, vcs.ref.base.type, vcs.line_change.type]
  vcs.ref.revisions_delta:
    enabled: true
    description: The number of revisions (commits) a ref (branch) is ahead/behind the branch from trunk (default).
    stability: development
    unit: '{revision}'
    gauge:
      value_type: int
    attributes: [vcs.repository.url.full, vcs.repository.name, vcs.repository.id, vcs.ref.head.name, vcs.ref.head.type, vcs.revision_delta.direction]
  vcs.ref.time:
    enabled: true
    description: Time a ref (branch) created from the default branch (trunk) has existed. The `vcs.ref.head.type` attribute will always be `branch`.
    stability: development
    unit: s
    gauge:
      value_type: int
    attributes: [vcs.repository.url.full, vcs.repository.name, vcs.repository.id, vcs.ref.head.name, vcs.ref.head.type]
  vcs.repository.count:
    enabled: true
    description: The number of repositories in an organization.
    stability: development
    unit: '{repository}'
    gauge:
      value_type: int
    attributes: []
  vcs.terraform.module.consumer:
    enabled: true
    description: A consuming project of a Terraform module. Value is always 1, attributes identify the consumer.
    stability: development
    unit: '{consumer}'
    gauge:
      value_type: int
    attributes: [vcs.terraform.module.name, vcs.terraform.module.system, vcs.repository.name, vcs.repository.url.full]
  vcs.terraform.module.consumer.count:
    enabled: true
    description: The number of distinct projects consuming a Terraform module.
    stability: development
    unit: '{consumer}'
    gauge:
      value_type: int
    attributes: [vcs.terraform.module.name, vcs.terraform.module.system]
  vcs.terraform.module.count:
    enabled: true
    description: The number of Terraform modules published in the group registry.
    stability: development
    unit: '{module}'
    gauge:
      value_type: int
    attributes: []


tests:
  config:
