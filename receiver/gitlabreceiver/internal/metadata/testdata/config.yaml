filter_set_include:
  resource_attributes:
    organization.name:
      enabled: true
      metrics_include:
        - regexp: ".*"
    vcs.vendor.name:
      enabled: true
      metrics_include:
        - regexp: ".*"
filter_set_exclude:
  resource_attributes:
    organization.name:
      enabled: true
      metrics_exclude:
        - strict: "organization.name-val"
    vcs.vendor.name:
      enabled: true
      metrics_exclude:
        - strict: "vcs.vendor.name-val"
