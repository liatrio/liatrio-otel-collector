---
name: build-and-test

on:
  pull_request:
    branches: [main]
    paths:
      - '**/Dockerfile'
      - '**/.dockerignore'
      - .github/**
      - '**.go'
      - '**.mod'
      - '**.sum'
      - config/**
      - '**/Makefile*'
      - '**/documentation.md'
      - .golangci.yaml
      - .goreleaser.yaml

  push:
    branches: [main]

jobs:
  lint:
    # Always run 1) if the branch isn't main OR 2) if the branch is main and the actor isn't octo-sts[bot]
    if: github.ref != 'refs/heads/main' || ( github.ref == 'refs/heads/main' && github.actor != 'octo-sts[bot]')
    strategy:
      matrix:
        go: ['1.26']
    name: lint
    runs-on: ubuntu-latest
    steps:
      - name: Clone repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
          cache: false

      - name: Make install-tools
        run: make install-tools

      - name: Make lint-all
        run: make lint-all

      - name: Check Code Generation
        run: |
          make generate
          if ! git diff --quiet; then
            echo "Generated code is out of date. Run make generate and commit the changes."
            exit 1
          fi

      - name: Check Packages Are Up-to-Date
        run: |
          make tidy-all
          if ! git diff --quiet; then
            echo "Packages are out of date. Run make tidy-all and commit the changes."
            exit 1
          fi

      - name: Check Crosslink Run
        run: |
          make crosslink
          if ! git diff --quiet; then
            echo "Replace statements not updated. Run make crosslink and commit the changes."
            exit 1
          fi

  generate:
    if: github.ref != 'refs/heads/main' || ( github.ref == 'refs/heads/main' && github.actor != 'octo-sts[bot]')
    strategy:
      matrix:
        go: ['1.26']
    name: generate
    runs-on: ubuntu-latest
    steps:
      - name: Clone repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
          cache: false

      - name: Make install-tools
        run: make install-tools

      - name: Check Code Generation
        run: |
          make generate
          if ! git diff --quiet; then
            echo "Generated code is out of date. Run make generate and commit the changes."
            exit 1
          fi

      - name: Check Packages Are Up-to-Date
        run: |
          make tidy-all
          if ! git diff --quiet; then
            echo "Packages are out of date. Run make tidy-all and commit the changes."
            exit 1
          fi

  regen:
    name: regen
    needs: [generate, lint]
    # Only runs when Tier 1 (generate/lint) failed on a renovate[bot] PR, and never on a push made
    # by the octo-sts bot itself (this job's own commit re-triggers `synchronize`, which would
    # otherwise recurse). This is a plain AND, not the repo's default OR'd/ref-negated guard, because
    # this job must never run on `main` or on non-Renovate PRs regardless of failure() state.
    if: failure() && github.event.pull_request.user.login == 'renovate[bot]' && github.actor != 'octo-sts[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Get Octo STS Token
        uses: octo-sts/action@210248e8ae1ae1550aa6e232c6f192b3ccbf7335
        id: octo-sts
        with:
          scope: ${{ github.repository }}
          identity: regen

      - name: Clone repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ steps.octo-sts.outputs.token }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          # Do not leave the write-capable octo-sts token in the git credential store for the
          # duration of the job — the regen steps below run PR-provided (Renovate-bumped) code, so
          # the push step authenticates explicitly instead of relying on a persisted credential.
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: false

      - name: Get GitHub App User ID
        id: get-user-id
        run: echo "user-id=$(gh api "/users/octo-sts[bot]" --jq .id)" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ steps.octo-sts.outputs.token }}

      - name: Configure git committer
        run: |
          git config user.name 'octo-sts[bot]'
          git config user.email '${{ steps.get-user-id.outputs.user-id }}+octo-sts[bot]@users.noreply.github.com'

      - name: Make install-tools
        run: make install-tools

      # A Go major-version dependency bump (e.g. backoff/v5 -> backoff/v7) adds a new require line
      # that nothing imports yet — the source-level import-path migration is a judgment-tier change
      # Tier 1 doesn't attempt. `go mod tidy` then "correctly" drops that unused, newly-added line,
      # which silently undoes the bump instead of fixing codegen drift. This snapshot, compared
      # after the mechanical fixes below, is what lets the next step catch that and refuse to push.
      - name: Snapshot module requirements (pre-fix)
        run: |
          find . -not -path './build/*' -not -path './tmp/*' -name go.mod | sort | while read -r mod; do
            dir=$(dirname "$mod")
            go -C "$dir" mod edit -json | jq -r --arg dir "$dir" '(.Require // [])[] | "\($dir)\t\(.Path)@\(.Version)"'
          done > /tmp/regen-reqs-before.txt

      - name: Run mechanical regeneration
        run: |
          make generate
          make tidy-all
          make crosslink
          make fmt-all

      - name: Refuse to silently drop dependency requirements
        run: |
          find . -not -path './build/*' -not -path './tmp/*' -name go.mod | sort | while read -r mod; do
            dir=$(dirname "$mod")
            go -C "$dir" mod edit -json | jq -r --arg dir "$dir" '(.Require // [])[] | "\($dir)\t\(.Path)@\(.Version)"'
          done > /tmp/regen-reqs-after.txt
          removed=$(comm -23 <(sort /tmp/regen-reqs-before.txt) <(sort /tmp/regen-reqs-after.txt))
          if [ -n "$removed" ]; then
            echo "Mechanical regeneration would remove module requirement(s) present before this job ran:"
            echo "$removed"
            echo
            echo "This usually means the bump needs a source-level change (e.g. a Go major-version"
            echo "import-path migration) that Tier 1 can't perform, and 'go mod tidy' is dropping the"
            echo "newly-added, still-unused requirement instead of completing it. Refusing to"
            echo "commit/push; leaving this PR failing for manual or /fix-skill follow-up."
            exit 1
          fi

      - name: Refuse to push workflow changes
        run: |
          if ! git diff --quiet --name-only -- .github/; then
            echo "Regeneration touched .github/** — refusing to commit/push a workflow-poisoning diff."
            git diff --name-only -- .github/
            exit 1
          fi

      # Deliberately does NOT re-apply Renovate's `rebase` label after pushing. Re-adding it would
      # tell Renovate to force-rebase the branch from the dependency update on its next run, which
      # recreates the branch and discards this foreign commit — undoing the fix and looping forever.
      # Renovate treats a foreign commit as a signal to stop auto-rebasing that branch, which is the
      # outcome we want: our fix sticks, and the PR is left for CI to go green and get merged.
      - name: Commit and push fixes
        env:
          # Pass the untrusted, user-controllable branch name and the octo-sts token through the
          # environment rather than interpolating them into the shell — `${{ … }}` expansion happens
          # before the script runs, so a crafted head ref could otherwise inject shell commands.
          GH_TOKEN: ${{ steps.octo-sts.outputs.token }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          REPO: ${{ github.repository }}
        run: |
          if git diff --quiet; then
            echo "No mechanical fixes needed; nothing to commit."
            exit 0
          fi
          git add .
          git commit -m "chore: run make generate"
          git push "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git" "HEAD:${HEAD_REF}"

  build:
    name: build
    if: github.ref != 'refs/heads/main' || ( github.ref == 'refs/heads/main' && github.actor != 'octo-sts[bot]')
    strategy:
      matrix:
        GOOS: [darwin, linux, windows]
        GOARCH: [arm64, amd64, '386']
        go: ['1.26']
        exclude:
          - GOOS: darwin
            GOARCH: '386'
          - GOOS: darwin
            GOARCH: arm
          - GOOS: windows
            GOARCH: arm
          - GOOS: windows
            GOARCH: arm64
    runs-on:
      group: bigger
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Clone repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
          cache: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build
        env:
          GGOOS: ${{ matrix.GOOS }}
          GGOARCH: ${{ matrix.GOARCH }}
        run: make build


  test:
    if: github.ref != 'refs/heads/main' || ( github.ref == 'refs/heads/main' && github.actor != 'octo-sts[bot]')
    strategy:
      matrix:
        go: ['1.26']
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
          cache: false

      - name: Make test-all
        run: make test-all

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true

  multimod-prepare-release:
    if: ${{ github.ref == 'refs/heads/main' && github.actor != 'octo-sts[bot]' }}
    needs: [lint, build]
    runs-on:
      group: bigger
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Get Octo STS Token
        uses: octo-sts/action@210248e8ae1ae1550aa6e232c6f192b3ccbf7335
        id: octo-sts
        with:
          scope: ${{ github.repository }}
          identity: semantic-release

      - name: Clone repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ steps.octo-sts.outputs.token }}
          fetch-depth: 0

      - name: Install tools
        run: make install-tools

      - name: Get next version
        id: get_next_version
        uses: thenativeweb/get-next-version@b66ed58cb3556622f81636ca9fb483df6de0dc7a # 2.7.4
        with:
          prefix: v # optional, defaults to ''

      - name: Show the next version
        run: |
          echo ${{ steps.get_next_version.outputs.version }}
          echo ${{ steps.get_next_version.outputs.hasNextVersion }}

      - name: Get GitHub App User ID
        id: get-user-id
        run: echo "user-id=$(gh api "/users/octo-sts[bot]" --jq .id)" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ steps.octo-sts.outputs.token }}

      - name: Multimod release #This is so multimod prerelease can get author info
        if: steps.get_next_version.outputs.hasNextVersion == 'true'
        run: |
          set -eo pipefail
          git config --global user.name 'octo-sts[bot]'
          git config --global user.email '${{ steps.get-user-id.outputs.user-id }}+octo-sts[bot]@users.noreply.github.com'
          yq -i '.module-sets.liatrio-otel.version = "${{ steps.get_next_version.outputs.version }}"' versions.yaml
          git add .
          git commit -m "chore: run multimod to update versions ahead of release(version ${{ steps.get_next_version.outputs.version }})"
          make multimod-prerelease
          git push
