---
name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '23 6 * * 1'

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: go
            build-mode: manual
          - language: actions
            build-mode: none
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@458d36d7d4f47d0dd16ca424c1d3cda0060f1360 # v3.35.5
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-and-quality

      # Multi-module layout: a stub root go.mod plus one go.mod per
      # subdirectory and no go.work, so Autobuild's "go build ./..." at
      # the root finds nothing. Walk each module's go.mod and build it
      # under CodeQL's tracer so every package gets extracted.
      #
      # `go build ./...` compiles production code only — *_test.go files
      # are skipped, leaving ~46% of this repo's Go source unscanned.
      # `go test -count=1 -run='^$' ./...` compiles every test binary
      # (tracer captures the compiles) but the empty-regex `-run`
      # filter executes no test bodies. `-count=1` disables the test
      # cache so compilation always happens. This mirrors upstream
      # codeql-action autobuild's two-pass behavior.
      #
      # CodeQL bundles its own Go SDK and prepends it to PATH, so no
      # actions/setup-go step is needed. Autobuild handles `go mod
      # download` automatically; manual mode has to do it explicitly.
      - name: Manual build (Go)
        if: matrix.language == 'go'
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t modules < <(find . -name go.mod \
            -not -path './.git/*' \
            -not -path './.claude/*' \
            -not -path './.tools/*' \
            -not -path './vendor/*' \
            -not -path './go.mod' \
            -exec dirname {} \;)
          for dir in "${modules[@]}"; do
            echo "::group::go build + test compile $dir"
            (cd "$dir" && \
              go mod download && \
              go build ./... && \
              go test -count=1 -run='^$' ./...)
            echo "::endgroup::"
          done

      - name: Analyze
        uses: github/codeql-action/analyze@458d36d7d4f47d0dd16ca424c1d3cda0060f1360 # v3.35.5
        with:
          category: /language:${{ matrix.language }}
